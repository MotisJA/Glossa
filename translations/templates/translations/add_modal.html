
<div role="alert" class="alert alert-success alert-soft bottom-4 left-1/2 -translate-x-1/2 z-50" id="success-message" style="display: none;">
  <span>Added to the Translation Memory!</span>
</div>
<dialog id="translation_modal" class="modal">
  <div class="modal-box w-11/12 max-w-[820px] p-0 overflow-hidden">
    <div class="px-6 py-5 border-b border-slate-200 bg-gradient-to-r from-slate-50 to-white">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-xl bg-blue-600 text-white flex items-center justify-center font-semibold">
          TM
        </div>
        <div>
          <h3 class="font-semibold text-lg">Add to Translation Memory</h3>
          <p class="text-sm text-slate-600">Save this pair for reuse in AI post-editing and matching.</p>
        </div>
      </div>
    </div>

    <div class="px-6 py-5 space-y-4 bg-white">
      <div class="space-y-2">
        <label for="english-text" class="text-sm font-medium text-slate-700">English Text</label>
        <textarea
          id="modal-english-text"
          placeholder="Enter English text here..."
          class="textarea textarea-bordered w-full h-32 p-3 border rounded-xl shadow-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 bg-white"
        ></textarea>
      </div>

      <div class="space-y-2">
        <label for="modal-tgt-translation" class="text-sm font-medium text-slate-700">Translation</label>
        <textarea
          id="modal-tgt-translation"
          placeholder="Enter translation here..."
          class="textarea textarea-bordered w-full h-32 p-3 border rounded-xl shadow-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 bg-white"
        ></textarea>
      </div>
    </div>

    <div class="modal-action px-6 py-4 bg-slate-50 border-t border-slate-200">
      <form method="dialog" class="space-x-2">
        <button class="btn btn-ghost" type="button" onclick="translation_modal.close()">Cancel</button>
        <button class="btn btn-primary" type="submit">Save to Memory</button>
      </form>
    </div>
  </div>

  <script>
    document.querySelector('.modal-action form').addEventListener('submit', async function(e) {
      e.preventDefault();
      
      const submitBtn = this.querySelector('button[type="submit"]');
      submitBtn.classList.add('loading', 'loading-dots', 'loading-xs');
      
      const englishText = document.getElementById('modal-english-text').value;
      const tgtTranslation = document.getElementById('modal-tgt-translation').value;

      // Get CSRF token from cookie
      function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
          const cookies = document.cookie.split(';');
          for (let i = 0; i < cookies.length; i++) {
            const cookie = cookies[i].trim();
            if (cookie.substring(0, name.length + 1) === (name + '=')) {
              cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
              break;
            }
          }
        }
        return cookieValue;
      }

      try {
        const response = await fetch('/api/corpus-entry/', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/x-www-form-urlencoded',
            'X-CSRFToken': getCookie('csrftoken')
          },
          body: new URLSearchParams({
            'src': englishText,
            'translation': tgtTranslation
          })
        });

        if (!response.ok) {
          throw new Error('Network response was not ok');
        }

        document.getElementById('final-translation').textContent = tgtTranslation;
        translation_modal.close();

        // success message: show for 5 secs
        successMessage = document.getElementById('success-message');

        // remove the style attribute to show the message
        successMessage.removeAttribute('style');
        successMessage.classList.add('fixed');
        setTimeout(() => {
          successMessage.style.display = 'none';
          successMessage.classList.remove('fixed');
        }, 5000);
      } catch (error) {
        console.error('Error:', error);
      } finally {
        submitBtn.classList.remove('loading', 'loading-dots', 'loading-xs');
      }
    });
  </script>
</dialog>
