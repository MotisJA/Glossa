{% load static %}

<!DOCTYPE html>
<html>
<head>
    <title>已退出登录 - Glossa</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    {% comment %} Customize at https://v5.daisyui.com/docs/cdn/ {% endcomment %}
    <link href="https://cdn.jsdelivr.net/combine/npm/daisyui@beta/base/properties.css,npm/daisyui@beta/base/reset.css,npm/daisyui@beta/base/rootcolor.css,npm/daisyui@beta/base/rootscrollgutter.css,npm/daisyui@beta/base/rootscrolllock.css,npm/daisyui@beta/base/scrollbar.css,npm/daisyui@beta/base/svg.css,npm/daisyui@beta/components/button.css,npm/daisyui@beta/components/input.css,npm/daisyui@beta/theme/light.css" rel="stylesheet" type="text/css" />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #10162f;
            --muted: #5b6173;
            --panel: #ffffff;
            --border: #e2e8f0;
            --shadow: 0 20px 60px rgba(15, 23, 42, 0.12);
        }
        body {
            font-family: "Space Grotesk", system-ui, -apple-system, sans-serif;
            color: var(--ink);
            background:
                radial-gradient(1200px 600px at 10% -20%, rgba(59, 130, 246, 0.15), transparent 60%),
                radial-gradient(800px 500px at 110% 20%, rgba(34, 197, 94, 0.12), transparent 55%),
                linear-gradient(180deg, #f8fafc 0%, #eef2ff 100%);
        }
        .panel {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 16px;
            box-shadow: var(--shadow);
        }
        .brand-badge {
            background: linear-gradient(135deg, #2563eb 0%, #0ea5e9 100%);
            color: #fff;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center px-4">
    <div class="panel w-full max-w-md p-6 text-center">
        <img src="{% static 'admin/logo.svg' %}" alt="Glossa Logo" class="w-14 h-14 object-contain mx-auto" />
        <h1 class="text-2xl font-semibold mt-4">你已退出登录</h1>
        <p class="text-sm text-slate-600 mt-2">感谢使用翻译工作台，稍后可再次登录。</p>
        <a href="{% url 'login' %}" class="btn btn-primary mt-6 w-full">重新登录</a>
    </div>
</body>
</html>
