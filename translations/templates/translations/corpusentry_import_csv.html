{% extends 'unfold/layouts/base.html' %}

{% block content %}
    <style>
        .glossa-card {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(15, 23, 42, 0.08);
            overflow: hidden;
        }
        .glossa-header {
            display: flex;
            gap: 12px;
            align-items: center;
            padding: 18px 20px;
            background: linear-gradient(135deg, #f8fafc 0%, #eef2ff 100%);
            border-bottom: 1px solid #e2e8f0;
        }
        .glossa-badge {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: linear-gradient(135deg, #2563eb 0%, #0ea5e9 100%);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
        }
        .glossa-body {
            padding: 20px;
        }
        .glossa-body p {
            color: #5b6173;
            margin-top: 4px;
        }
    </style>
    <div class="glossa-card">
        <div class="glossa-header">
            <div class="glossa-badge">G</div>
            <div>
                <div class="text-sm uppercase tracking-widest text-slate-500">Import</div>
                <h2 class="text-xl font-semibold">Upload CSV</h2>
            </div>
        </div>
        <div class="glossa-body">
            <p class="text-sm">支持包含 `en` 与 `tgt` 字段的 CSV 文件，用于批量导入术语或记忆。</p>
            <form action="." method="POST" enctype="multipart/form-data" class="mt-4">
                {% csrf_token %}
                {{ form.as_p }}
                <div class="submit-row">
                    <button type="submit" class="default">Upload CSV</button>
                </div>
            </form>
        </div>
    </div>

{% endblock %}
